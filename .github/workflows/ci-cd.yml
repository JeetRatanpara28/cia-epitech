name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO_BACKEND: ${{ secrets.ECR_REPO_BACKEND }}
  ECR_REPO_FRONTEND: ${{ secrets.ECR_REPO_FRONTEND }}

jobs:
  test:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: back_student/package-lock.json

      - name: Backend install & type-check
        working-directory: back_student
        run: |
          npm ci --legacy-peer-deps
          npx tsc --noEmit

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: front_student/package-lock.json

      - name: Frontend install & build
        working-directory: front_student
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_API_URL: http://localhost:3000
        run: |
          npm ci --legacy-peer-deps
          npm run build

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: back_student
          push: true
          tags: |
            ${{ env.ECR_REPO_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REPO_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: front_student
          push: true
          build-args: REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          tags: |
            ${{ env.ECR_REPO_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REPO_FRONTEND }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/${{ secrets.EC2_USER }}/app

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPO_BACKEND: ${{ secrets.ECR_REPO_BACKEND }}
          ECR_REPO_FRONTEND: ${{ secrets.ECR_REPO_FRONTEND }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          ADMIN_API_TOKEN: ${{ secrets.PROD_ADMIN_API_TOKEN }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASS: ${{ secrets.PROD_DB_PASS }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          CORS_ORIGINS: ${{ secrets.PROD_CORS_ORIGINS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPO_BACKEND,ECR_REPO_FRONTEND,IMAGE_TAG,AWS_REGION,JWT_SECRET,ADMIN_API_TOKEN,DB_USER,DB_PASS,DB_NAME,CORS_ORIGINS
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/app
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
