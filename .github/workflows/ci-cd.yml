name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: back_student/package-lock.json

      - name: Backend install & type-check
        working-directory: back_student
        run: |
          npm ci --legacy-peer-deps
          npx tsc --noEmit

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: front_student/package-lock.json

      - name: Frontend install & build
        working-directory: front_student
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_API_URL: ""
        run: |
          npm ci --legacy-peer-deps
          npm run build
