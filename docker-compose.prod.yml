version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: prod_db
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${ECR_REPO_BACKEND}:${IMAGE_TAG:-latest}
    container_name: api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${ECR_REPO_FRONTEND}:${IMAGE_TAG:-latest}
    container_name: prod_frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    networks:
      - app_network
    depends_on:
      - api

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
