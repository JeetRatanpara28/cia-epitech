version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: prod_db
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dev_db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${ECR_REGISTRY}/cia-backend:${IMAGE_TAG:-latest}
    container_name: prod_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${ECR_REGISTRY}/cia-frontend:${IMAGE_TAG:-latest}
    container_name: prod_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
