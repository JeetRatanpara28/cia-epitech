services:
  - type: web
    name: cia-backend
    runtime: docker
    dockerfilePath: ./back_student/Dockerfile
    dockerContext: ./back_student
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cia-db
          property: connectionString

  - type: web
    name: cia-frontend
    runtime: static
    buildCommand: cd front_student && npm ci --legacy-peer-deps && NODE_OPTIONS=--openssl-legacy-provider npm run build
    staticPublishPath: ./front_student/build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false

databases:
  - name: cia-db
    databaseName: cia_epitech
    plan: free
